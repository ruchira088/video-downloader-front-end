name: video-downloader-front-end destroy dev deployment

on:
  pull_request:
    types:
      - closed
    branches:
      - main

concurrency:
  group: pipeline-refs/heads/${{ github.event.pull_request.head.ref }}
  cancel-in-progress: false

jobs:
  destroy-dev:
    name: Destroy dev deployment
    runs-on: ubuntu-latest

    # Fork PRs never deployed a dev stack
    if: github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: main # head branch may already be deleted after merge

      # Stack naming reads the local branch name via simple-git
      - name: Recreate branch name for CDK stack resolution
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: git checkout -B "$HEAD_REF"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ap-southeast-2
          role-session-name: video-downloader-front-end-dev-destroy
          role-to-assume: "arn:aws:iam::365562660444:role/github_iam_role"

      - name: Install deploy dependencies
        run: npm ci
        working-directory: cdk-deploy

      - name: Destroy S3 & Cloudfront resources
        run: npm run destroy
        working-directory: cdk-deploy

      - name: Delete branch artifacts from S3
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: aws s3 rm "s3://video-downloader-front-end-bundles.ruchij.com/$HEAD_REF/" --recursive
